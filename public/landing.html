<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArmorCode CSE — Customer Dashboards</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3150;
      --accent: #6c63ff;
      --text: #e8eaf6;
      --muted: #8b91b5;
      --red: #ff4d6d;
      --orange: #ff9f43;
      --green: #2ed573;
    }
    [data-theme="light"] {
      --bg: #f4f5f9;
      --surface: #ffffff;
      --surface2: #f0f1f6;
      --border: #dde0ee;
      --accent: #5b52e8;
      --text: #1a1d2e;
      --muted: #6b6f8a;
      --red: #e03050;
      --orange: #d4820a;
      --green: #1a9e52;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-badge {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }
    .logo-divider { width: 1px; height: 32px; background: var(--border); }
    .logo h1 { font-size: 17px; font-weight: 600; }
    .logo span { color: var(--muted); font-size: 13px; margin-left: 4px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .user-info-bar { display: flex; align-items: center; gap: 8px; }

    /* MAIN */
    main {
      padding: 28px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Portfolio summary strip (replaces left sidebar) */
    .portfolio-strip {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      margin-bottom: 22px;
    }
    .portfolio-strip .ps-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .portfolio-strip .ps-val { font-size: 18px; font-weight: 700; line-height: 1; }
    .portfolio-strip .ps-item { text-align: center; }
    .portfolio-strip .ps-divider { width: 1px; height: 28px; background: var(--border); }

    .page-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .page-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .customer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* TILE */
    .customer-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .customer-tile::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--cust-primary, var(--accent));
      border-radius: 14px 14px 0 0;
    }
    .customer-tile:hover {
      border-color: var(--cust-primary, var(--accent));
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.15);
    }

    /* Theme toggle */
    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .theme-toggle:hover { color: var(--text); background: var(--border); }

    .tile-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .tile-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--cust-primary, var(--text));
    }
    .health-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .health-healthy  { background: rgba(46,213,115,.12); border: 1px solid #2ed573; color: #2ed573; }
    .health-attention{ background: rgba(255,159,67,.12); border: 1px solid var(--orange); color: var(--orange); }
    .health-risk     { background: rgba(255,77,109,.12); border: 1px solid var(--red); color: var(--red); }
    .health-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* STATS ROW */
    .tile-stats {
      display: flex; gap: 12px; margin-bottom: 14px;
    }
    .stat-chip {
      flex: 1; background: var(--surface2); border-radius: 8px;
      padding: 8px 10px; text-align: center;
    }
    .stat-chip .num { font-size: 20px; font-weight: 700; line-height: 1; }
    .stat-chip .lbl { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-loading { color: var(--muted); font-size: 11px; }

    /* FOOTER ROW */
    .tile-footer {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--muted); margin-top: 4px;
    }
    .slack-channels { display: flex; gap: 4px; flex-wrap: wrap; }
    .slack-chip {
      background: var(--surface2); padding: 2px 7px; border-radius: 4px;
      font-family: monospace; font-size: 10px; color: var(--muted);
    }
    .tile-arrow { font-size: 14px; color: var(--cust-primary, var(--muted)); opacity: 0.7; }

    footer {
      text-align: center; padding: 24px; font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border); margin-top: 40px;
    }

    /* spinner */
    .mini-spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--border); border-top-color: var(--muted);
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <!-- ArmorCode logo (simplified) -->
    <svg width="30" height="33" viewBox="0 0 84 92" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0" aria-label="ArmorCode">
      <defs>
        <clipPath id="lcp_p"><circle cx="30" cy="34" r="27"/></clipPath>
        <clipPath id="lcp_b"><circle cx="54" cy="34" r="27"/></clipPath>
        <clipPath id="lcp_y"><circle cx="42" cy="56" r="27"/></clipPath>
        <mask id="lm_pb"><circle cx="54" cy="34" r="27" clip-path="url(#lcp_p)" fill="white"/></mask>
      </defs>
      <circle cx="30" cy="34" r="27" fill="#F9A8C0"/>
      <circle cx="54" cy="34" r="27" fill="#A8C4F8"/>
      <circle cx="42" cy="56" r="27" fill="#F8F8A0"/>
      <circle cx="54" cy="34" r="27" clip-path="url(#lcp_p)" fill="#C89AD8"/>
      <circle cx="42" cy="56" r="27" clip-path="url(#lcp_p)" fill="#F08098"/>
      <circle cx="42" cy="56" r="27" clip-path="url(#lcp_b)" fill="#88CCA8"/>
      <circle cx="42" cy="56" r="27" clip-path="url(#lcp_y)" mask="url(#lm_pb)" fill="#5C4A8A"/>
    </svg>
    <div class="logo-badge">ArmorCode</div>
    <div class="logo-divider"></div>
    <h1>CSE Dashboards <span>Customer 360</span></h1>
  </div>
  <div class="header-right">
    <div class="user-info-bar">
      <img id="user-photo" src="" alt="" style="width:28px;height:28px;border-radius:50%;display:none">
      <div>
        <div id="user-name" style="font-size:13px;font-weight:600;color:var(--text)">...</div>
        <div id="user-email" style="font-size:11px;color:var(--muted)"></div>
      </div>
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode">
        <span id="theme-icon">☀️</span><span id="theme-label">Light</span>
      </button>
      <a href="/logout" style="margin-left:8px;font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:3px 10px;border-radius:6px;background:var(--surface2)">Logout</a>
    </div>
  </div>
</header>

<main>
  <!-- Portfolio summary strip -->
  <div class="portfolio-strip">
    <div class="ps-item">
      <div class="ps-val" id="total-open">—</div>
      <div class="ps-label">Open</div>
    </div>
    <div class="ps-divider"></div>
    <div class="ps-item">
      <div class="ps-val" style="color:var(--red)" id="total-bugs">—</div>
      <div class="ps-label">Bugs</div>
    </div>
    <div class="ps-divider"></div>
    <div class="ps-item">
      <div class="ps-val" style="color:var(--accent)" id="total-eng">—</div>
      <div class="ps-label">ENG Active</div>
    </div>
    <div style="flex:1"></div>
    <div style="font-size:11px;color:var(--muted)">6 accounts · Live from Jira (ENG, PROD)</div>
  </div>

  <!-- Customer grid — full width -->
  <div class="page-title">My Accounts</div>
  <div class="page-subtitle">Click any account to open its Customer 360 dashboard</div>
  <div class="customer-grid" id="customer-grid">
    <!-- tiles injected by JS -->
  </div>
</main>

<footer>
  ArmorCode CSE Assist &nbsp;·&nbsp; Restricted to @armorcode.io &nbsp;·&nbsp; Data sourced from Jira (ENG, PROD)
</footer>

<script>
const CUSTOMERS = [
  { id: 'paypal',   name: 'PayPal',   primary: '#4A90FF', secondary: '#00C2FF', slack: ['ext-paypal-armorcode','paypal-prep','internal-paypal'] },
  { id: 'beneva',   name: 'Beneva',   primary: '#A855F7', secondary: '#C084FC', slack: ['internal-beneva'] },
  { id: 'korber',   name: 'Korber',   primary: '#FF5733', secondary: '#FF8C69', slack: [] },
  { id: 'solera',   name: 'Solera',   primary: '#FFB132', secondary: '#FFCC70', slack: [] },
  { id: 'visa',     name: 'Visa',     primary: '#4169E1', secondary: '#F7B600', slack: [] },
  { id: 'stancorp', name: 'StanCorp', primary: '#22C55E', secondary: '#4ADE80', slack: [] },
];

// ── Theme — persisted in localStorage ────────────────────────────────────────
const THEME_KEY = 'ac_cse_theme';
let _isDark = localStorage.getItem(THEME_KEY)
  ? localStorage.getItem(THEME_KEY) === 'dark'
  : !window.matchMedia('(prefers-color-scheme: light)').matches;
function applyTheme(dark) {
  _isDark = dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-icon').textContent = dark ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = dark ? 'Light' : 'Dark';
  localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
}
function toggleTheme() { applyTheme(!_isDark); }
applyTheme(_isDark);

// ── Populate header user info from /api/me ──────────────────────────────
fetch('/api/me').then(r => r.json()).then(u => {
  if (u.name) document.getElementById('user-name').textContent = u.name;
  if (u.email) document.getElementById('user-email').textContent = u.email;
  if (u.photo) {
    const img = document.getElementById('user-photo'); img.src = u.photo; img.style.display = 'block';
  }
}).catch(() => {});

// Build tiles
const grid = document.getElementById('customer-grid');
CUSTOMERS.forEach(c => {
  const tile = document.createElement('a');
  tile.href = '/' + c.id;
  tile.className = 'customer-tile';
  tile.style.setProperty('--cust-primary', c.primary);

  const slackHtml = c.slack.length
    ? c.slack.map(s => `<span class="slack-chip">#${s}</span>`).join('')
    : '<span style="font-style:italic;font-size:10px">No channels yet</span>';

  tile.innerHTML = `
    <div class="tile-header">
      <div class="tile-name">${c.name}</div>
      <div class="health-badge health-attention" id="health-${c.id}">
        <span class="health-dot"></span>
        <span class="mini-spinner"></span>
      </div>
    </div>
    <div class="tile-stats" id="stats-${c.id}">
      <div class="stat-chip"><div class="num" style="color:${c.primary}" id="open-${c.id}"><span class="mini-spinner"></span></div><div class="lbl">Open</div></div>
      <div class="stat-chip"><div class="num" style="color:#ff4d6d" id="bugs-${c.id}">—</div><div class="lbl">Bugs</div></div>
      <div class="stat-chip"><div class="num" style="color:#6c63ff" id="eng-${c.id}">—</div><div class="lbl">ENG Active</div></div>
    </div>
    <div class="tile-footer">
      <div class="slack-channels">${slackHtml}</div>
      <div class="tile-arrow">→</div>
    </div>
  `;
  grid.appendChild(tile);
});

// Portfolio-wide totals (accumulated as tiles load)
const _portfolio = { open: 0, bugs: 0, eng: 0, loaded: 0 };
function updatePortfolio() {
  document.getElementById('total-open').textContent = _portfolio.open;
  document.getElementById('total-bugs').textContent = _portfolio.bugs;
  document.getElementById('total-eng').textContent  = _portfolio.eng;
}

// Load ticket counts for each customer
CUSTOMERS.forEach(c => {
  fetch('/api/tickets/' + c.id)
    .then(r => r.json())
    .then(data => {
      const tickets = data.tickets || [];
      const open = tickets.length;
      const bugs = tickets.filter(t => (t.type||'').toLowerCase() === 'bug').length;
      const engActive = tickets.filter(t => (t.key||'').startsWith('ENG-')).length;
      const urgentBugs = tickets.filter(t => (t.type||'').toLowerCase() === 'bug' && ['urgent','highest'].includes((t.priority||'').toLowerCase())).length;
      const overdueCount = tickets.filter(t => { const d = t.duedate||t.eta; return d && new Date(d) < new Date(); }).length;

      document.getElementById('open-' + c.id).textContent = open;
      document.getElementById('bugs-' + c.id).textContent = bugs;
      document.getElementById('eng-' + c.id).textContent = engActive;

      // Accumulate into portfolio summary
      _portfolio.open += open; _portfolio.bugs += bugs; _portfolio.eng += engActive;
      _portfolio.loaded++;
      updatePortfolio();

      // Health: AT RISK if any urgent bug or ≥3 overdue; NEEDS ATTENTION if any bug or high ENG load; else HEALTHY
      const healthEl = document.getElementById('health-' + c.id);
      let healthClass, healthLabel;
      if (urgentBugs >= 1 || overdueCount >= 3) {
        healthClass = 'health-risk'; healthLabel = 'AT RISK';
      } else if (bugs > 0 || engActive > 5) {
        healthClass = 'health-attention'; healthLabel = 'NEEDS ATTENTION';
      } else {
        healthClass = 'health-healthy'; healthLabel = 'HEALTHY';
      }
      healthEl.className = 'health-badge ' + healthClass;
      healthEl.innerHTML = `<span class="health-dot"></span>${healthLabel}`;

      // Alert glow on tiles with active bugs (red) or active ENG tickets (purple)
      if (bugs > 0 || engActive > 0) {
        const tileEl = document.querySelector(`a[href="/${c.id}"]`);
        if (tileEl) {
          const glowColor = bugs > 0 ? 'rgba(255,77,109,0.20)' : 'rgba(108,99,255,0.18)';
          tileEl.style.boxShadow = `0 0 0 1px ${glowColor}, inset 0 0 24px ${glowColor}`;
        }
      }
    })
    .catch(() => {
      document.getElementById('open-' + c.id).textContent = '—';
      const healthEl = document.getElementById('health-' + c.id);
      healthEl.className = 'health-badge health-attention';
      healthEl.innerHTML = `<span class="health-dot"></span>N/A`;
    });
});
</script>
</body>
</html>
